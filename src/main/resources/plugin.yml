name: Ymshop
version: '1.0-SNAPSHOT'
main: ym.ymshop.Ymshop
api-version: '1.21'
authors: [ ymxc ]
folia-supported: true
softdepend: [ Vault, PlayerPoints, PlaceholderAPI ]
commands:
