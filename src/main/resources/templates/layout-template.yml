title: "{shop-name}"
size: 54

open-actions:
  1:
    type: sound
    sound: item.book.page_turn

layout:
  - "000000000"
  - "0ABCDEFG0"
  - "0HIJKLMN0"
  - "0OPQRSTU0"
  - "0VWXYZab0"
  - "000435000"

buttons:
  "3":
    display-item:
      material: BARRIER
      amount: 1
      name: "&c关闭菜单"
    actions:
      1:
        type: close
  "4":
    display-item:
      material: SPECTRAL_ARROW
      amount: 1
      name: "&e上一页"
      lore:
        - "&7当前页: &f{current_page}/{total_pages}"
    actions:
      1:
        type: previous_page
  "5":
    display-item:
      material: ARROW
      amount: 1
      name: "&e下一页"
      lore:
        - "&7当前页: &f{current_page}/{total_pages}"
    actions:
      1:
        type: next_page
  "0":
    display-item:
      material: WHITE_STAINED_GLASS_PANE
      amount: 1
      name: "&7分割线"

# 说明:
# 1. 所有非按钮字符位置都会被视为商品槽位。
# 2. 商品会按照 shops/*.yml 里 items 的顺序依次填充到这些槽位。
# 3. 你可以自由修改布局，只要按钮字符在 buttons 里定义即可。
