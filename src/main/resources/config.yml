currencies:
  vault:
    type: VAULT
    display-name: "&#FFB300金币"
  playerpoints:
    type: PLAYERPOINTS
    display-name: "&e点券"

database:
  type: yaml
  host: "127.0.0.1"
  port: 3306
  database: "ymshop"
  username: "root"
  password: ""
  pool-size: 10
  ssl: false

# 每日/定时限购限售的重置时区；留空时默认跟随服务器 JVM 时区。
# 示例: "Asia/Shanghai"
reset-timezone: ""

trade-click-cooldown-ticks: 4

item-template:
  buy:
    default-name: "&#FFB300{material_name}"
    default-lore: []
    append-lore:
      - ""
      - "&#00E676价格: &#FFFFFF{buy-price} {currency}"
      - "{buy-limit-player-line}"
      - "{buy-limit-server-line}"
      - "{buy-blocked-player-line}"
      - "{buy-blocked-server-line}"
      - "{buy-no-money-line}"
      - "{buy-refresh-player-line}"
      - ""
      - "{buy_left_hint_line}"
      - "{buy_right_hint_line}"
      - "{buy_shift_left_hint_line}"
      - "{buy_shift_right_hint_line}"
  sell:
    default-name: "&#FFB300{material_name}"
    default-lore: []
    append-lore:
      - ""
      - "&#FFB300出售: &#FFFFFF{sell-price} {currency}"
      - "{sell-limit-player-line}"
      - "{sell-limit-server-line}"
      - "{sell-blocked-player-line}"
      - "{sell-blocked-server-line}"
      - "{sell-no-items-line}"
      - "{sell-refresh-player-line}"
      - ""
      - "{sell_left_hint_line}"
      - "{sell_right_hint_line}"
      - "{sell_shift_left_hint_line}"
      - "{sell_shift_right_hint_line}"
  dual:
    default-name: "&#FFB300{material_name}"
    default-lore: []
    append-lore:
      - ""
      - "&#00E676购买: &#FFFFFF{buy-price} {currency}"
      - "&#FFB300出售: &#FFFFFF{sell-price} {currency}"
      - "{buy-limit-player-line}"
      - "{buy-limit-server-line}"
      - "{sell-limit-player-line}"
      - "{sell-limit-server-line}"
      - "{buy-blocked-player-line}"
      - "{buy-blocked-server-line}"
      - "{buy-no-money-line}"
      - "{sell-blocked-player-line}"
      - "{sell-blocked-server-line}"
      - "{sell-no-items-line}"
      - "{buy-refresh-dual-line}"
      - "{sell-refresh-dual-line}"
      - ""
      - "{buy_left_hint_line}"
      - "{buy_shift_left_hint_line}"
      - "{sell_right_hint_line}"
      - "{sell_shift_right_hint_line}"

render-text:
  trade-mode:
    buy: "购买"
    sell: "出售"
  limits:
    buy-player-line: "&#FF7777玩家购买次数: {buy-times-player}/{buy-limit-player}"
    buy-server-line: "&#FF7777服务器购买次数: {buy-times-server}/{buy-limit-server}"
    sell-player-line: "&#FF7777玩家出售次数: {sell-times-player}/{sell-limit-player}"
    sell-server-line: "&#FF7777服务器出售次数: {sell-times-server}/{sell-limit-server}"
  blocked:
    buy-player-line: "&#ff3300无法再购买更多！"
    buy-server-line: "&#ff3300已售罄！"
    buy-no-money-line: "&#ff3300余额不足！"
    sell-player-line: "&#ff3300无法再出售更多！"
    sell-server-line: "&#ff3300服务器无法再出售更多！"
    sell-no-items-line: "&#ff3300背包里没有可出售的物品！"
  refresh:
    buy-player-line: "&8刷新时间: {buy-refresh-player}"
    sell-player-line: "&8刷新时间: {sell-refresh-player}"
    buy-dual-line: "&8购买刷新: {buy-refresh-player}"
    sell-dual-line: "&8出售刷新: {sell-refresh-player}"
  click:
    left: "左键"
    right: "右键"
    shift-left: "Shift+左键"
    shift-right: "Shift+右键"
    buy-action: "购买"
    sell-action: "出售"
    all-line: "&#FF5252{click}: &#90A4AE{action}全部"
    fixed-line: "&#FF5252{click}: &#90A4AE{action} {amount} 个"
  reset:
    disabled: "未启用"
  duration:
    day: "{value}天"
    hour: "{value}小时"
    minute: "{value}分钟"
    second: "{value}秒"
  format:
    unlimited: "无限"
  summary:
    default-currency: "金额"

confirm-menu:
  title: "&#FFB300确认交易"
  side-buy: "购买"
  side-sell: "出售"
  estimate-buy-label: "消费"
  estimate-sell-label: "收益"
  confirm-slot: 11
  preview-slot: 13
  cancel-slot: 15
  filler-item:
    material: BLACK_STAINED_GLASS_PANE
    name: "&7 "
  confirm-item:
    material: LIME_STAINED_GLASS_PANE
    name: "&a确认{confirm_side}"
    lore:
      - "&7本次操作: &f{confirm_side}"
      - "&7倍率: &f{confirm_times}"
      - "&7数量: &f{confirm_amount}"
      - "&7单价: &6{confirm_unit_price} {currency}"
      - "&7总价: &6{confirm_price} {currency}"
  cancel-item:
    material: RED_STAINED_GLASS_PANE
    name: "&#FF7777取消交易"
  preview-lore:
    - "&8确认预览"
    - "&7本次操作: &f{confirm_side}"
    - "&7本次数量: &f{confirm_amount}"
    - "&7预计{confirm_price_label}: &6{confirm_price} {currency}"
  preview-sellable-line: "&7当前可售: &f{sellable_amount}"

favorites-menu:
  title: "&6我的收藏"
  background-item:
    material: BLACK_STAINED_GLASS_PANE
    name: "&7 "
  empty-item:
    material: NETHER_STAR
    name: "&e我的收藏"
    lore:
      - "&7当前还没有收藏商品"
      - "&7在商品页按 &fQ &7即可收藏"
  favorite-line: "&eQ键: 加入收藏"
  unfavorite-line: "&6Q键: 取消收藏"
  added-message: "&a已收藏: &f{item}"
  removed-message: "&e已取消收藏: &f{item}"
  previous-enabled-item:
    material: SPECTRAL_ARROW
    name: "&e上一页"
    lore:
      - "&7当前页: &f{current_page}/{total_pages}"
  previous-disabled-item:
    material: GRAY_DYE
    name: "&7已经是第一页"
    lore:
      - "&7当前页: &f{current_page}/{total_pages}"
  next-enabled-item:
    material: ARROW
    name: "&e下一页"
    lore:
      - "&7当前页: &f{current_page}/{total_pages}"
  next-disabled-item:
    material: GRAY_DYE
    name: "&7已经是最后一页"
    lore:
      - "&7当前页: &f{current_page}/{total_pages}"
  back-item:
    material: ARROW
    name: "&c返回上一页"
  close-item:
    material: BARRIER
    name: "&c关闭菜单"

